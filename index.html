<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task's App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="container">
    <div class="header-top">
        <h1 class="logo">Task Manager</h1>
        <div class="header-actions">
            <button title="Cambiar Tema" id="theme-toggle"><i class="btn-icon fas fa-moon"></i></button>
            <button class="btn-icon btn-red"><i class="fas fa-trash"></i></button>
            <button class="btn-icon btn-yellow"><i class="fas fa-sync-alt"></i></button>
            <button class="btn-github"> <a class="link__head" href="https://github.com/ChicoGavi" target="_blank"> <i class="fas fa-code"> </i></a></button>
        </div>
    </div>

    <form class="form-section" id="form">
        <label for="task-input">¿What are you doing today?</label>
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Write here..." required> 
            <button id="add-btn">ENTER</button>
        </div>
    </form>
</header>

<main class="container">
    <table class="task-table">
        <thead>
        <tr>
            <th class="col-num">#</th>
            <th class="col-task">Tasks</th>
            <th class="col-actions">Actions</th>
        </tr>
        </thead>
        <tbody id="task-list">

        </tbody>
    </table>
    
</main>

<footer class="container">
    <a href="https://github.com/ChicoGavi"  target="_blank" class="github-link">
        <i class="fab fa-github"></i>
        <span>@ChicoGavi</span>
    </a>
</footer>

<script src="app.js"></script>
</body>
</html>
